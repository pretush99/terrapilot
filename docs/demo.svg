<svg xmlns="http://www.w3.org/2000/svg" width="900" height="660" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="15">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f2a"/>
      <stop offset="1" stop-color="#11141c"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="900" height="660" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="40" rx="14" fill="#272c3a"/>
  <rect x="0" y="26" width="900" height="14" fill="#272c3a"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="450" y="25" fill="#8b93a7" text-anchor="middle" font-size="13">terrapilot — real terraform, governed by policy</text>

  <!-- body -->
  <g>
    <text x="24" y="78" fill="#7ee787">$</text>
    <text x="44" y="78" fill="#c9d1d9">terrapilot demo</text>

    <text x="24" y="116" fill="#58a6ff" font-weight="bold">─── 1. Discover stacks ───</text>
    <text x="44" y="140" fill="#8b93a7">[ dev] env/dev/hello</text>
    <text x="44" y="162" fill="#8b93a7">[prod] env/prod/hello</text>

    <text x="24" y="200" fill="#58a6ff" font-weight="bold">─── 2. DEV change → auto-apply ───</text>
    <text x="44" y="224" fill="#c9d1d9">decision : <tspan fill="#7ee787">auto_apply</tspan>  (dev)</text>
    <text x="44" y="246" fill="#c9d1d9">plan     : Plan: 1 to add, 0 to change, 0 to destroy.</text>
    <text x="44" y="268" fill="#c9d1d9">status   : applied  <tspan fill="#7ee787">✓ shipped, no human needed</tspan></text>

    <text x="24" y="306" fill="#58a6ff" font-weight="bold">─── 3. PROD change → approval gate ───</text>
    <text x="44" y="330" fill="#c9d1d9">decision : <tspan fill="#ffbd2e">require_approval</tspan>  (prod)</text>
    <text x="44" y="352" fill="#c9d1d9">PR       : <tspan fill="#58a6ff">github.com/…/pull/…  (opened)</tspan></text>
    <text x="44" y="374" fill="#c9d1d9">slack    : <tspan fill="#58a6ff">approval requested</tspan></text>

    <text x="24" y="412" fill="#58a6ff" font-weight="bold">─── 4. Apply BEFORE approval is refused ───</text>
    <text x="44" y="436" fill="#ff7b72">✋ refused: 'pending', not approved. prod requires sign-off.</text>

    <text x="24" y="474" fill="#58a6ff" font-weight="bold">─── 5. Lead signs off → apply succeeds ───</text>
    <text x="44" y="498" fill="#c9d1d9">approve  : approved by lead@platform</text>
    <text x="44" y="520" fill="#c9d1d9">apply    : applied  <tspan fill="#7ee787">✓</tspan></text>

    <text x="24" y="566" fill="#7ee787" font-weight="bold">✓ End-to-end pipeline demonstrated — real terraform, real governance.</text>

    <text x="24" y="610" fill="#8b93a7" font-size="13">Prompt → AI → Terraform → Plan → Approval → Apply</text>
    <text x="24" y="632" fill="#6e7681" font-size="13">github.com/pretush99/terrapilot</text>
  </g>
</svg>
